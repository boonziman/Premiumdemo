{{- /* 404 — Case-insensitive redirect for GitHub Pages */ -}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Redirecting… — ARCHITECT</title>
  <style>
    body {
      background: #131313;
      color: #e5e2e1;
      font-family: 'Outfit', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .container {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }
    h1 {
      font-family: 'Syne', sans-serif;
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
    }
    p { color: #9a8f80; margin-bottom: 2rem; }
    a {
      color: #E9C176;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      font-size: 0.875rem;
      border: 1px solid rgba(233,193,118,0.4);
      padding: 0.75rem 2rem;
      display: inline-block;
      transition: all 0.3s;
    }
    a:hover { background: rgba(233,193,118,0.1); border-color: #E9C176; }
  </style>
  <script>
    (function() {
      // Attempt case-insensitive redirect for GitHub Pages
      var path = window.location.pathname;
      var lower = path.toLowerCase();

      // If the path contains uppercase letters, redirect to lowercase version
      if (path !== lower) {
        window.location.replace(
          window.location.origin + lower + window.location.search + window.location.hash
        );
        return; // stop rendering — redirect is in progress
      }
    })();
  </script>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>This page doesn't exist. You may have followed an outdated link.</p>
    <a href="{{ "" | relURL }}">Return Home</a>
  </div>
</body>
</html>
